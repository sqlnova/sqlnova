<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1627"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Borde sutil -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <!-- Símbolo > prompt -->
  <text x="8" y="40" font-family="monospace" font-size="26" font-weight="700" fill="url(#glow)">&gt;_</text>
  <!-- Punto de acento inferior derecho -->
  <circle cx="52" cy="52" r="4" fill="#00d4ff" opacity="0.7"/>
</svg>
